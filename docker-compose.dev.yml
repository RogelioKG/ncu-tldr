name: ncu-tldr-dev
services:
  db:
    container_name: ncu-tldr-dev-db
    image: postgres:18
    ports:
      - "5432:5432"

  frontend:
    container_name: ncu-tldr-dev-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
      CHOKIDAR_USEPOLLING: true
    develop:
      watch:
        - action: rebuild
          path: ./frontend/package.json
        - action: rebuild
          path: ./frontend/pnpm-lock.yaml

        - action: sync
          path: ./frontend/src/
          target: /app/src/
        - action: sync
          path: ./frontend/public/
          target: /app/public/
        - action: sync
          path: ./frontend/index.html
          target: /app/index.html
        - action: sync
          path: ./frontend/vite.config.ts
          target: /app/vite.config.ts

  backend:
    container_name: ncu-tldr-dev-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    ports:
      - "8000:8000"
    develop:
      watch:
        - action: rebuild
          path: ./backend/pyproject.toml
        - action: rebuild
          path: ./backend/uv.lock

        - action: sync
          path: ./backend/main.py
          target: /app/main.py
        - action: sync
          path: ./backend/app/
          target: /app/app/
        - action: sync
          path: ./backend/alembic/
          target: /app/alembic/
        - action: sync
          path: ./backend/alembic.ini
          target: /app/alembic.ini
